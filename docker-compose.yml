services:
  timescaledb:
    image: timescale/timescaledb-ha:pg16
    container_name: mqtt-ingest-sql-timescaledb
    environment:
      POSTGRES_DB: mqtt
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "127.0.0.1:55432:5432"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U postgres -d mqtt && psql -U postgres -d mqtt -Atc \"WITH retention_policies AS (SELECT h.schema_name AS hypertable_schema, h.table_name AS hypertable_name, (j.config ->> 'drop_after')::INTERVAL AS drop_after, j.schedule_interval FROM timescaledb_information.jobs j JOIN _timescaledb_catalog.hypertable h ON h.id = (j.config ->> 'hypertable_id')::INTEGER WHERE j.proc_name = 'policy_retention' AND j.config ? 'hypertable_id') SELECT to_regclass('mqtt_ingest.messages') IS NOT NULL AND to_regclass('mqtt_ingest.relay_state_events') IS NOT NULL AND to_regclass('mqtt_ingest.message_3m_aggregates') IS NOT NULL AND to_regclass('mqtt_ingest.topic_overview') IS NOT NULL AND to_regprocedure('mqtt_ingest.ingest_message(text,text,timestamp with time zone,jsonb)') IS NOT NULL AND to_regprocedure('mqtt_ingest.ingest_topics(text,text,timestamp with time zone,jsonb)') IS NOT NULL AND EXISTS (SELECT 1 FROM retention_policies WHERE hypertable_schema = 'mqtt_ingest' AND hypertable_name = 'messages' AND drop_after = INTERVAL '12 months' AND schedule_interval = INTERVAL '1 day') AND EXISTS (SELECT 1 FROM retention_policies WHERE hypertable_schema = 'mqtt_ingest' AND hypertable_name = 'relay_state_events' AND drop_after = INTERVAL '12 months' AND schedule_interval = INTERVAL '1 day')\" | grep -q t",
        ]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s
    volumes:
      - .:/docker-entrypoint-initdb.d:ro
